name: CineVerse CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Build & Test Frontend
  # ──────────────────────────────────────────────
  build-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Cineverse_website/frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: Cineverse_website/frontend
        run: npm ci

      - name: 🏗️ Build production bundle
        working-directory: Cineverse_website/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://cineverse-gateway.onrender.com/api' }}

      - name: ✅ Verify build output
        run: |
          echo "Frontend build successful"
          ls -la Cineverse_website/frontend/dist

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Cineverse_website/frontend/dist
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2 — Build Backend Services (matrix)
  # ──────────────────────────────────────────────
  build-backend:
    name: ☕ Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth-service, movie-service, booking-service, gateway]
      fail-fast: false

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🏗️ Build ${{ matrix.service }}
        working-directory: Cineverse_website/backend/${{ matrix.service }}
        run: mvn clean package -DskipTests -B

      - name: ✅ Verify JAR exists
        run: |
          echo "${{ matrix.service }} build successful"
          ls -la Cineverse_website/backend/${{ matrix.service }}/target/*.jar

  # ──────────────────────────────────────────────
  # JOB 3 — Deploy to Render (only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Trigger Render frontend deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" > /dev/null
            echo "✅ Frontend deploy triggered on Render"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_FRONTEND secret not set — skipping auto-deploy"
            echo "   Add it at: Settings → Secrets → Actions"
          fi

      - name: 📋 Deployment summary
        run: |
          echo "============================================="
          echo "  CineVerse CI/CD — All Builds Passed ✅"
          echo "============================================="
          echo "  Frontend  : ✅ Built & Deployed"
          echo "  Auth      : ✅ Built"
          echo "  Movies    : ✅ Built"
          echo "  Booking   : ✅ Built"
          echo "  Gateway   : ✅ Built"
          echo "============================================="
          echo "  🌐 Live: https://cineverse-frontend-r4w6.onrender.com"
          echo "  📦 Repo: github.com/iamujjwal69/cineverse"
          echo "============================================="
