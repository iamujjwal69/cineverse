name: CineVerse CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: Cineverse_website/frontend
        run: npm install

      - name: Build production bundle
        working-directory: Cineverse_website/frontend
        run: npm run build
        env:
          VITE_API_URL: https://cineverse-gateway-cv6o.onrender.com/api

      - name: Verify build output exists
        run: ls -la Cineverse_website/frontend/dist

  deployment-info:
    name: Deployment Info
    runs-on: ubuntu-latest
    needs: build-and-test-frontend

    steps:
      - name: Print live URLs
        run: |
          echo "========================================="
          echo "  CineVerse Deployment Info"
          echo "========================================="
          echo "  Frontend : https://cineverse-ipsj.onrender.com"
          echo "  Gateway  : https://cineverse-gateway-cv6o.onrender.com"
          echo "  Auth API : https://cineverse-auth-2554.onrender.com"
          echo "========================================="
          echo "  Build passed. Render auto-deploys on push."
          echo "========================================="
