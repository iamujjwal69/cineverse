name: CineVerse CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-frontend:
    name: Build & Verify Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Cineverse_website/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Cineverse_website/frontend
        run: npm ci

      - name: Build production bundle
        working-directory: Cineverse_website/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8080/api' }}

      - name: Verify build output exists
        run: |
          echo "✅ Frontend build successful"
          ls -la Cineverse_website/frontend/dist

  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth-service, movie-service, booking-service, gateway]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }}
        working-directory: Cineverse_website/backend/${{ matrix.service }}
        run: mvn clean package -DskipTests -B

      - name: Verify JAR exists
        run: |
          echo "✅ ${{ matrix.service }} build successful"
          ls -la Cineverse_website/backend/${{ matrix.service }}/target/*.jar

  deployment-info:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]

    steps:
      - name: Print build summary
        run: |
          echo "========================================="
          echo "  CineVerse CI/CD — All Builds Passed ✅"
          echo "========================================="
          echo "  Frontend  : ✅ Built"
          echo "  Auth      : ✅ Built"
          echo "  Movies    : ✅ Built"
          echo "  Booking   : ✅ Built"
          echo "  Gateway   : ✅ Built"
          echo "========================================="
          echo "  Render auto-deploys on push to main."
          echo "  Repo: github.com/iamujjwal69/cineverse"
          echo "========================================="
