# Render Infrastructure-as-Code (Blueprint)
# Deploy all CineVerse services with one click
# https://render.com/docs/infrastructure-as-code

databases:
  - name: cineverse-postgres
    plan: free
    databaseName: cineverse
    user: cineverse_user
    region: oregon

services:
  # ─────────────────────────────────────────────
  # Auth Service (Spring Boot + PostgreSQL)
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-auth
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/auth-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cineverse-postgres
          property: connectionURI
      - key: DB_USER
        fromDatabase:
          name: cineverse-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cineverse-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8081

  # ─────────────────────────────────────────────
  # Movie Service (Spring Boot + MongoDB Atlas)
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-movies
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/movie-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false  # Set manually — use MongoDB Atlas free tier
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379
      - key: PORT
        value: 8082

  # ─────────────────────────────────────────────
  # Booking Service (Spring Boot + PostgreSQL)
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-booking
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/booking-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cineverse-postgres
          property: connectionURI
      - key: DB_USER
        fromDatabase:
          name: cineverse-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cineverse-postgres
          property: password
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379
      - key: RABBITMQ_HOST
        value: localhost
      - key: RABBITMQ_PORT
        value: 5672
      - key: PORT
        value: 8083

  # ─────────────────────────────────────────────
  # API Gateway (Spring Cloud Gateway)
  # Render free services communicate via their public HTTPS URLs.
  # Set AUTH/MOVIE/BOOKING_SERVICE_URL manually in the Render dashboard
  # to the respective service's external URL after first deploy.
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-gateway
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/gateway
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AUTH_SERVICE_URL
        sync: false   # Set to https://cineverse-auth.onrender.com after first deploy
      - key: MOVIE_SERVICE_URL
        sync: false   # Set to https://cineverse-movies.onrender.com after first deploy
      - key: BOOKING_SERVICE_URL
        sync: false   # Set to https://cineverse-booking.onrender.com after first deploy
      - key: JWT_SECRET
        sync: false   # Must match cineverse-auth JWT_SECRET exactly
      - key: PORT
        value: 8080

  # ─────────────────────────────────────────────
  # Frontend (React + Vite → Render Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-frontend
    plan: free
    runtime: static
    region: oregon
    rootDir: Cineverse_website/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to https://cineverse-gateway.onrender.com/api after gateway is deployed
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
