databases:
  - name: cineverse-postgres
    plan: free
    databaseName: cineverse
    user: cineverse_user

services:
  # ─────────────────────────────────────────────
  # Auth Service
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-auth
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/auth-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cineverse-postgres
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: cineverse-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cineverse-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8081

  # ─────────────────────────────────────────────
  # Movie Service
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-movies
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/movie-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379
      - key: PORT
        value: 8082

  # ─────────────────────────────────────────────
  # Booking Service
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-booking
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/booking-service
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cineverse-postgres
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: cineverse-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cineverse-postgres
          property: password
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379
      - key: RABBITMQ_HOST
        value: localhost
      - key: RABBITMQ_PORT
        value: 5672
      - key: PORT
        value: 8083

  # ─────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-gateway
    plan: free
    runtime: docker
    region: oregon
    rootDir: Cineverse_website/backend/gateway
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AUTH_SERVICE_URL
        sync: false
      - key: MOVIE_SERVICE_URL
        sync: false
      - key: BOOKING_SERVICE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 8080

  # ─────────────────────────────────────────────
  # Frontend — Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: cineverse-frontend
    runtime: static
    rootDir: Cineverse_website/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
