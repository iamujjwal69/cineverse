server:
  port: 8080

spring:
  application:
    name: gateway
  
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
            allowCredentials: false
      
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

        - id: movie-service
          uri: ${MOVIE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/movies/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/bookings/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
        
        - id: movie-service
          uri: ${MOVIE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/movies/**
          filters:
            - StripPrefix=0
        
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/bookings/**
          filters:
            - StripPrefix=0

jwt:
  secret: ${JWT_SECRET:CineVerseSecretKeyForJWTTokenGeneration2024SecureAndLongEnoughKey}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.cineverse: INFO
