name: CineVerse CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./Cineverse_website/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./Cineverse_website/frontend
        run: npm run build
        env:
          VITE_API_URL: https://cineverse-gateway-cv6o.onrender.com/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: Cineverse_website/frontend/dist

  build-auth-service:
    name: Build Auth Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build auth service
        working-directory: ./Cineverse_website/backend/auth-service
        run: mvn clean package -DskipTests

  build-gateway:
    name: Build Gateway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build gateway
        working-directory: ./Cineverse_website/backend/gateway
        run: mvn clean package -DskipTests

  notify-deploy:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [ build-frontend, build-auth-service, build-gateway ]

    steps:
      - name: Deployment status
        run: |
          echo "✅ All builds passed!"
          echo "🌐 Frontend: https://cineverse-ipsj.onrender.com"
          echo "🔐 Auth API: https://cineverse-auth-2554.onrender.com"
          echo "🔀 Gateway:  https://cineverse-gateway-cv6o.onrender.com"
          echo "🚀 Render auto-deploys on push to main"
